services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mountaineer_auth_test_db
      POSTGRES_USER: mountaineer_auth
      POSTGRES_PASSWORD: mysecretpassword
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mountaineer_auth -d mountaineer_auth_test_db"]
      interval: 1s
      timeout: 5s
      retries: 30
